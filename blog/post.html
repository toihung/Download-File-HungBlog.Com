<ul id="fileList"></ul>

<script>
fetch('https://your-domain.com/data.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('fileList');

    data.forEach(item => {
      const li = document.createElement('li');
      const a = document.createElement('a');

      a.href = item.url;
      a.textContent = item.name;

      li.appendChild(a);
      container.appendChild(li);
    });
  });
</script>
